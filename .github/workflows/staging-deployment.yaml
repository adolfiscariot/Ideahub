name: Deploy to Staging

# Triggers every Wednesday at 12:00 UTC, or manually.
# Assumes PRs have already been merged into main before this runs.
on:
  schedule:
    - cron: "0 12 * * 3" # Every Wednesday at 12:00 UTC
  workflow_dispatch:     # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ideahub

jobs:
  # ============================================================
  # 1. BUILD & PUSH DOCKER IMAGE (tagged with commit SHA)
  # ============================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute short SHA
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image_ref }} .

      - name: Push image to GHCR
        run: |
          docker push ${{ steps.meta.outputs.image_ref }}

      - name: Verify image is pullable
        run: |
          docker pull ${{ steps.meta.outputs.image_ref }}
          echo "Image verified: ${{ steps.meta.outputs.image_ref }}"

  # ============================================================
  # 2. DEPLOY TO STAGING (on-prem via SSH — password auth)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy image to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script: |
            IMAGE_REF="${{ needs.build-and-push.outputs.image_ref }}"

            echo "Pulling image: $IMAGE_REF"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE_REF"

            echo "Stopping existing container (if any)..."
            docker stop ideahub-staging || true
            docker rm ideahub-staging || true

            echo "Starting new container..."
            docker run -d \
              --name ideahub-staging \
              --restart unless-stopped \
              --env-file /etc/ideahub/staging.env \
              -p 8080:8080 \
              "$IMAGE_REF"

            echo "Staging deployment complete: $IMAGE_REF"

  # ============================================================
  # 3. SMOKE TESTS — SSH into the server and test from inside
  #    No external URL needed. Tests hit localhost on the server.
  # ============================================================
  smoke-tests:
    name: Smoke Tests on Staging
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Run smoke tests on staging server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script: |
            echo "Waiting for container to be ready..."
            sleep 5

            echo "Checking container is running..."
            STATUS=$(docker inspect --format='{{.State.Status}}' ideahub-staging 2>/dev/null || echo "not found")
            echo "Container status: $STATUS"

            if [ "$STATUS" != "running" ]; then
              echo "Container is not running. Aborting."
              exit 1
            fi

            echo "Running health check..."
            curl --fail --retry 5 --retry-delay 3 http://localhost:8080/health \
              && echo "Health check passed" \
              || (echo "Health check failed" && exit 1)

  # ============================================================
  # 4. MANUAL APPROVAL GATE
  #    Workflow pauses here. A reviewer approves in GitHub UI.
  #    Once approved, the prod workflow is triggered automatically.
  # ============================================================
  await-approval:
    name: Await Team Approval
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-tests]
    environment: staging-approval  # Create this in repo Settings → Environments
                                   # and add required reviewers

    steps:
      - name: Log approved deployment details
        run: |
          echo "Staging approved. Triggering prod deployment..."
          echo "SHA: ${{ needs.build-and-push.outputs.sha_short }}"
          echo "Image: ${{ needs.build-and-push.outputs.image_ref }}"

      - name: Trigger production deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}  # PAT with repo scope
          event-type: deploy-prod
          client-payload: |
            {
              "sha_short": "${{ needs.build-and-push.outputs.sha_short }}",
              "image_ref": "${{ needs.build-and-push.outputs.image_ref }}"
            }
