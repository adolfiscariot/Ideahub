<div class="button">

  <!-- CASE 1: Navigation button -->
  @if (buttonLink) {
    <a [routerLink]="buttonLink">
      <button class="btn" [type]="buttonType" [ngClass]="buttonStyleClass" [disabled]="disabled" [attr.title]="title">
        {{ buttonText }}
        <ng-content></ng-content>
      </button>
    </a>
  }

  <!-- CASE 2: Normal button (no navigation) -->
  @if (!buttonLink) {
    <button class="btn" [type]="buttonType" [ngClass]="buttonStyleClass"
      [disabled]="disabled || isLoading" [attr.title]="title">
      @if (isLoading) {
        <span class="spinner"></span>
      }
      @if (!isLoading) {
        <span>{{ buttonText }}</span>
      }
      @if (!isLoading) {
        <ng-content></ng-content>
      }
    </button>
  }
</div>
