<div class="modal-content-wrapper">
    <!-- Header -->
    <div class="modal-header">
        <h2>Edit Project</h2>
        <button class="close-btn" (click)="onCancel()">
            <ng-icon name="heroXMark" size="1.5rem"></ng-icon>
        </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
        <div class="form-container">
            <div class="input-section">
                <label>Title</label>
                <div class="input-wrapper disabled">
                    <input type="text" [(ngModel)]="editedProject.title" disabled />
                </div>
                <span class="hint-text">Project titles cannot be changed directly.</span>
            </div>

            <div class="input-section">
                <label>Description</label>
                <div class="input-wrapper">
                    <textarea [(ngModel)]="editedProject.description" rows="4"
                        placeholder="Describe the project goals and scope..."></textarea>
                </div>
            </div>

            <div class="row">
                <div class="input-section half-width">
                    <label>Status</label>
                    <div class="input-wrapper">
                        <select [(ngModel)]="editedProject.status">
                            <option *ngFor="let status of statusOptions" [value]="status">
                                {{ getStatusLabel(status) }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="input-section half-width">
                    <label>End Date</label>
                    <div class="input-wrapper">
                        <input type="date" [(ngModel)]="editedProject.endedAt" />
                    </div>
                    <span class="hint-text">Leave empty if project is ongoing</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
        <app-buttons [buttonText]="'Cancel'" [buttonStyleClass]="'btn-secondary'" (click)="onCancel()">
        </app-buttons>

        <app-buttons [buttonText]="'Save Changes'" [buttonStyleClass]="'btn-primary'" (click)="onSave()">
        </app-buttons>
    </div>
</div>
