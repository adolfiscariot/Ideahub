<div class="modal-container">
  <div class="modal-header">
    <div class="header-info">
      <h2>Group Members</h2>
      <span class="member-count">{{ members.length }} members</span>
    </div>
    <button class="close-btn" (click)="close()">
      <ng-icon name="heroXMark" size="1.5rem"></ng-icon>
    </button>
  </div>

  <div class="modal-body">
    <div *ngIf="isLoading" class="loading">
      <div class="spinner"></div>
      <p>Loading members...</p>
    </div>

    <div *ngIf="!isLoading && members.length === 0" class="no-members">
      <div class="no-members-icon">
        <ng-icon name="heroUser" size="3rem" color="#9ca3af"></ng-icon>
      </div>
      <h3>No members found</h3>
      <p>This group doesn't have any members yet.</p>
    </div>

    <div *ngIf="!isLoading && members.length > 0" class="members-list">
      <div *ngFor="let member of members" class="member-item">
        <div class="member-left">
          <div class="member-avatar">
            {{ getInitials(member.displayName || member.userName || member.name || member.email) }}
          </div>
          <div class="member-details">
            <span class="member-name">
              {{ member.displayName || member.userName || member.name || 'Unknown User' }}
            </span>
            <div class="badges">
              <span *ngIf="member.id === data.group.createdByUserId" class="badge owner-badge">Owner</span>
              <span *ngIf="member.id === currentUserId" class="badge you-badge">You</span>
            </div>
          </div>
        </div>

        <div class="member-actions" *ngIf="isOwner && member.id !== data.group.createdByUserId">
          <button class="action-btn transfer-btn" (click)="transferOwnership(member)" title="Transfer Ownership">
            <ng-icon name="heroArrowsRightLeft" size="1.2rem"></ng-icon>
            <span class="btn-text">Transfer</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <app-buttons [buttonText]="'Close'" [buttonStyleClass]="'btn-close'" (click)="close()">
    </app-buttons>
  </div>
</div>
