<div class="groups-container">

  <!-- Header Section with Create Button -->
  <header class="groups-header">
    <div class="header-content">
      <div class="header-text">
        <h1 class="page-title">{{ title }}</h1>
        <p class="page-subtitle">{{ subtitle }}</p>
      </div>

      <app-buttons *ngIf="!showCreateModal && !isLoading && groups.length > 0" [buttonText]="'Create Group'"
        [buttonStyleClass]="'btn-create-group'" [buttonType]="'button'" (click)="openCreateModal()">
      </app-buttons>
    </div>
  </header>

  <hr class="divider">

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading">
    <div class="spinner"></div>
    <p>Loading groups...</p>
  </div>

  <!-- Groups List -->
  <div *ngIf="!isLoading" class="groups-list">

    <!-- No Groups State -->
    <ng-container *ngIf="groups.length === 0; else gridView">
      <div class="no-groups">
        <div class="no-groups-icon">
          <ng-icon name="heroUserGroup" size="3rem" color="#9ca3af"></ng-icon>
        </div>
        <h3>No groups yet</h3>
        <p>Be the first to create a group and start collaborating!</p>

        <app-buttons [buttonText]="'Create First Group'" [buttonStyleClass]="'btn-primary'" [buttonType]="'button'"
          (click)="openCreateModal()">
        </app-buttons>
      </div>
    </ng-container>

    <!-- Grid View -->
    <ng-template #gridView>
      <div class="groups-grid">
        <div *ngFor="let group of groups; trackBy: trackById" class="group-card">

          <div class="group-content-wrapper">
            <!-- Header: Title & Menu/Admin -->
            <div class="card-header">
              <div class="title-row">
                <h2 class="group-name" [title]="group.name">{{ group.name }}</h2>
                <div class="badges">
                  <span *ngIf="canConfigureGroup(group)" class="badge admin-badge" title="You are the admin">
                    Admin
                  </span>
                  <span class="badge privacy-badge" [class.public]="group.isPublic === 'Public'"
                    [class.private]="group.isPublic === 'Private'">
                    <ng-icon [name]="group.isPublic === 'Public' ? 'heroUserGroup' : 'heroLockClosed'"
                      size="0.9rem"></ng-icon>
                    {{ group.isPublic }}
                  </span>
                </div>
              </div>
            </div>

            <!-- Description -->
            <p class="group-description">{{ group.description }}</p>

            <!-- Metadata Row -->
            <div class="meta-row">
              <div class="meta-item members-item" title="Members">
                <ng-icon name="heroUserGroup" size="1.1rem" class="meta-icon"></ng-icon>
                <span>{{ group.memberCount || 0 }}</span>
              </div>
              <div class="meta-item ideas-item" title="Ideas">
                <ng-icon name="heroLightBulb" size="1.1rem" class="meta-icon"></ng-icon>
                <span>{{ group.ideaCount || 0 }}</span>
              </div>
              <div class="meta-item date-item">
                <ng-icon name="heroCalendar" size="1.1rem" class="meta-icon"></ng-icon>
                <span>{{ formatDate(group.createdAt) }}</span>
              </div>
            </div>
          </div>

          <!-- Divider -->
          <div class="card-divider"></div>

          <!-- Footer Actions -->
          <div class="card-footer">

            <!-- Primary Actions (Join/View) -->
            <div class="primary-actions">
              <!-- View Ideas Button (Secondary) -->
              <app-buttons *ngIf="group.isMember" [buttonText]="'View Ideas'" [buttonStyleClass]="'btn-view-board'"
                [isLoading]="loadingGroupId === group.id" [buttonType]="'button'" (click)="onViewIdeas(group.id)">
              </app-buttons>

              <div *ngIf="!group.isMember && group.hasPendingRequest" class="pending-status">
                <span class="status-dot"></span> Pending Approval
              </div>

              <app-buttons *ngIf="!group.isMember && !group.hasPendingRequest && group.isActive && !group.isDeleted"
                [buttonText]="'Join Group'" [buttonStyleClass]="'btn-join'" [buttonType]="'button'"
                (click)="onJoinGroup(group.id)">
              </app-buttons>
            </div>

            <!-- Secondary Actions (Details/Settings) -->
            <div class="secondary-actions">
              <button class="icon-btn" (click)="openDetailsModal(group)" title="Details">
                <ng-icon name="heroInformationCircle" size="1.3rem"></ng-icon>
              </button>

              <button class="icon-btn" (click)="openMembersModal(group)" title="Members">
                <ng-icon name="heroUsers" size="1.3rem"></ng-icon>
              </button>

              <button *ngIf="canConfigureGroup(group)" class="icon-btn delete-btn" (click)="openDeleteModal(group)"
                title="Delete Group">
                <ng-icon name="heroTrash" size="1.3rem"></ng-icon>
              </button>
            </div>

          </div>
        </div>
      </div>
    </ng-template>
  </div>
</div>

<!-- Group Details Modal -->
<app-group-details-modal [isVisible]="showDetailsModal" [group]="selectedGroup" (close)="closeDetailsModal()">
</app-group-details-modal>

<!-- Create Group Modal -->
<app-create-group-modal [isVisible]="showCreateModal" [isSubmitting]="isSubmitting" (close)="closeCreateModal()"
  (create)="onCreateGroup($event)">
</app-create-group-modal>

<!-- Delete Group Modal -->
<app-delete-group-modal [isVisible]="showDeleteModal" [group]="selectedGroup" [isDeleting]="isDeleting"
  (close)="closeDeleteModal()" (confirm)="deleteGroup($event)">
</app-delete-group-modal>
