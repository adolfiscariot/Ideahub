<div class="notifications-container">
  <h2>Pending Requests</h2>

  @if (loading) {
    <div>Loading requests...</div>
  }

  @if (errorMessage) {
    <div>{{ errorMessage }}</div>
  }

  @if (!loading && requests.length === 0) {
    <div>
      <p>No pending requests.</p>
    </div>
  }

  @for (req of requests; track req) {
    <div class="request-card">
      <span class="request-user">{{ req }}</span>

      <div class="actions">
        <button (click)="acceptRequest('9', req)" class="accept-btn">Accept</button>
        <button (click)="rejectRequest('9', req)" class="reject-btn">Reject</button>
      </div>
    </div>
  }
</div>
